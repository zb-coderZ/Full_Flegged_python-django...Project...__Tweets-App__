{% extends "layout.html" %}

{% block title %}Logout - TweetApp{% endblock %}

{% block content %}

<div class="flex items-center justify-center mt-20">

    <div class="bg-slate-800 border border-slate-700 p-8 rounded-xl text-center max-w-md w-full">

        <h2 class="text-2xl font-bold text-white">
            You’ve been logged out
        </h2>

        <p class="text-slate-400 mt-3">
            You have successfully logged out of your account.
        </p>

        <div class="mt-6">

            <a href="{% url 'login' %}"
               class="inline-block px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition">
                Login Again
            </a>

        </div>

        <p class="text-slate-500 text-sm mt-4">
            Want to create a new account?
            <a href="{% url 'register' %}" class="text-blue-500 hover:underline">
                Register here
            </a>
        </p>

    </div>

</div>

{% endblock %}
