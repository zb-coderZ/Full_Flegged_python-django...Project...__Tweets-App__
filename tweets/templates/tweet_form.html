{% extends "layout.html" %}

{% block title %}
Tweet Form Page
{% endblock %}

{% block content %}
<h2>
    {% if form.instance.pk %} 
    Edit Tweet
    {% else %}
    Create Tweet
    {% endif %}
</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{form.as_p}}
    <button type="submit" class="bg-green-500 p-2" >Submit</button>
    <a href="{% url 'tweet_list' %}">Back to Tweet List</a>
</form>

{% endblock %}
