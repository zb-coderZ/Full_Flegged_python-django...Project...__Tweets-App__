{% extends "layout.html" %}

{% block title %}Login - TweetApp{% endblock %}

{% block content %}

<!-- CENTER WRAPPER -->
<div class="flex items-center justify-center mt-16">

    <div class="w-full max-w-md bg-slate-800 border border-slate-700 p-8 rounded-xl">

        <!-- HEADER -->
        <h2 class="text-3xl font-bold text-white text-center">
            Welcome Back
        </h2>

        <p class="text-slate-400 text-center mt-2 mb-6">
            Login to continue to TweetApp
        </p>

        <!-- FORM -->
        <form method="post" class="space-y-4">
            {% csrf_token %}

            <div class="text-slate-300">
                {{ form.as_p }}
            </div>

            <button type="submit"
                    class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition font-medium">
                Login
            </button>
        </form>

        <!-- REGISTER LINK -->
        <p class="text-slate-400 text-center mt-6 text-sm">
            Don’t have an account?
            <a href="{% url 'register' %}" class="text-blue-500 hover:underline">
                Register here
            </a>
        </p>

    </div>

</div>

{% endblock %}
